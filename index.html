<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON VOID | ARCADE</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <div id="arcade-cabinet">
        <!-- CABINET OVERLAYS -->
        <div class="cabinet-frame"></div>
        <div class="neon-inner-glow"></div>
        <div class="scanlines"></div>
        <div id="flash-effect"></div>

        <div id="ui-layer">
            <!-- TOP HUD -->
            <div class="hud-top">
                <div class="hud-group">
                    <span class="hud-label cyan">HIGH SCORE</span>
                    <span class="hud-value">00042850</span>
                </div>
                <div class="logo-container">
                    <h1 class="neon-title">NEON VOID</h1>
                </div>
                <div class="hud-group tar">
                    <span class="hud-label magenta">WAVE <span id="wave-val">01</span></span>
                    <span id="score-val" class="hud-value">00000000</span>
                </div>
            </div>

            <!-- MAIN CANVAS -->
            <div class="viewport">
                <canvas id="game-canvas"></canvas>
            </div>

            <!-- BOTTOM HUD -->
            <div class="hud-bottom">
                <div class="hud-group">
                    <span class="hud-label cyan">STATUS</span>
                    <div id="lives-display" class="lives-row">❤❤❤</div>
                </div>
                <div class="controls-hint">
                    <div class="control-item"><span class="key">ARROWS</span> MOVE</div>
                    <div class="control-item"><span class="key">SPACE</span> FIRE</div>
                </div>
            </div>

            <!-- FOOTER -->
            <div class="footer-text">
                © 1984 VOIDSYSTEMS HEAVY INDUSTRIES // GRID_SECURED
            </div>

            <!-- OVERLAYS -->
            <div id="start-screen" class="overlay">
                <div class="glass-panel">
                    <div class="panel-header cyan">SYSTEM READY</div>
                    <h2 class="panel-title">NEON VOID</h2>
                    <button id="start-btn" class="arcade-btn">INITIALIZE</button>
                    <p class="panel-hint">PRESS SPACE TO START MISSION</p>
                </div>
            </div>

            <div id="game-over-screen" class="overlay hidden">
                <div class="glass-panel alert">
                    <div class="panel-header magenta">COMMUNICATION LOST</div>
                    <h2 class="panel-title">OFFLINE</h2>
                    <div class="panel-stats">FINAL SCORE: <span id="final-score">0</span></div>
                    <button id="restart-btn" class="arcade-btn">REBOOT</button>
                </div>
            </div>
        </div>
    </div>

    <!-- GAME ENGINE -->
    <script type="module" src="/src/game.js"></script>
</body>
</html>
